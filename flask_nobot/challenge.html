<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width,initial-scale=1" />
        <meta name="referrer" content="no-referrer" />
        <meta
            http-equiv="Content-Security-Policy"
            content="default-src 'none'; style-src 'unsafe-inline'; script-src 'unsafe-inline'; connect-src 'self'; img-src 'self' data:; base-uri 'none'; form-action 'none'; frame-ancestors 'none'"
        />
        <title>Verifying</title>
        <style>
            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }
            html,
            body {
                height: 100%;
            }
            body {
                background: #17191a;
                color: #e8e8e8;
                font-family:
                    ui-sans-serif,
                    system-ui,
                    -apple-system,
                    'Segoe UI',
                    Helvetica,
                    sans-serif;
                font-size: 15px;
                line-height: 1.55;
                -webkit-font-smoothing: antialiased;
                text-rendering: optimizeLegibility;
                min-height: 100vh;
                display: flex;
                justify-content: center;
                align-items: flex-start;
                padding-top: clamp(6rem, 22vh, 13rem);
            }
            .wrap {
                width: min(640px, calc(100% - 2.5rem));
                text-align: left;
            }
            .brand {
                display: flex;
                align-items: center;
                gap: 0.85rem;
                margin-bottom: 1.75rem;
            }
            .brand svg {
                width: 34px;
                height: 34px;
                flex-shrink: 0;
            }
            .host {
                font-size: clamp(1.5rem, 3.2vw, 1.9rem);
                font-weight: 600;
                letter-spacing: -0.015em;
                color: #f1f1f1;
                font-family: ui-monospace, 'SF Mono', 'JetBrains Mono', Menlo, monospace;
            }
            h1 {
                font-size: clamp(1.1rem, 2vw, 1.3rem);
                font-weight: 600;
                margin-bottom: 0.6rem;
                letter-spacing: -0.005em;
                color: #f5f5f5;
            }
            p {
                color: #9aa0a6;
                max-width: 58ch;
                margin-bottom: 2rem;
            }
            .status {
                display: flex;
                align-items: center;
                gap: 0.85rem;
                color: #e8e8e8;
            }
            .pulse {
                width: 20px;
                height: 20px;
                border: 2px solid #3a3d3e;
                border-top-color: #e8e8e8;
                border-radius: 50%;
                animation: spin 0.75s linear infinite;
                flex-shrink: 0;
            }
            .status .label {
                font-size: 0.95rem;
                font-weight: 500;
                letter-spacing: -0.003em;
            }
            @keyframes spin {
                to {
                    transform: rotate(360deg);
                }
            }
            .status.ok .pulse {
                border: 2px solid transparent;
                border-radius: 0;
                animation: none;
                background: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%234ade80' stroke-width='3' stroke-linecap='round' stroke-linejoin='round'><polyline points='20 6 9 17 4 12'/></svg>")
                    no-repeat center/20px;
            }
            .status.ok .label {
                color: #4ade80;
            }
            .status.err .pulse {
                border-color: #512626;
                border-top-color: #fca5a5;
                animation: none;
            }
            .status.err .label {
                color: #fca5a5;
            }
            .credit {
                position: fixed;
                bottom: 1.5rem;
                left: 0;
                right: 0;
                text-align: center;
                color: #6b7075;
                font-size: 0.82rem;
                padding: 0 1.25rem;
            }
            .credit a {
                color: #b5b9bd;
                border-bottom: 1px dotted #4a4d4e;
                padding-bottom: 1px;
            }
            .credit a:hover {
                color: #f1f1f1;
                border-bottom-color: #9aa0a6;
            }
            noscript {
                display: block;
                margin-top: 1rem;
                padding: 0.9rem 1.2rem;
                background: #2a1616;
                border: 1px solid #512626;
                color: #fca5a5;
                border-radius: 4px;
                max-width: 420px;
            }
            @media (prefers-reduced-motion: reduce) {
                .pulse {
                    animation: none;
                    border-top-color: #3a3d3e;
                }
            }
        </style>
    </head>
    <body>
        <div class="wrap">
            <div class="brand">
                <img
                    id="brand-favicon"
                    src="/favicon.ico"
                    width="34"
                    height="34"
                    style="flex-shrink: 0; border-radius: 4px"
                    aria-hidden="true"
                    onerror="
                        this.style.display = 'none';
                        document.getElementById('brand-svg').style.display = 'block';
                    "
                />
                <svg
                    id="brand-svg"
                    style="display: none"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="#22b8a6"
                    stroke-width="1.75"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    aria-hidden="true"
                >
                    <rect x="4.25" y="10.5" width="15.5" height="11" rx="1.75" />
                    <path d="M8 10.5V7a4 4 0 0 1 8 0v1" />
                    <circle cx="12" cy="16" r="1.15" fill="#22b8a6" stroke="none" />
                </svg>
                <div class="host" id="host"></div>
            </div>
            <h1>Checking your browser</h1>
            <p>
                One moment while we confirm you're human. This check helps keep the site safe from
                automated traffic.
            </p>
            <div class="status" id="w" role="status" aria-live="polite">
                <div class="pulse" id="p"></div>
                <div class="label" id="l">Verifying your browser…</div>
            </div>
            <noscript
                >JavaScript is required to complete verification. Please enable it and
                reload.</noscript
            >
        </div>
        <div class="credit">
            Protected by
            <a href="https://github.com/tn3w/flask-nobot" target="_blank" rel="noopener noreferrer"
                >flask-nobot</a
            >
            · <a href="https://github.com/tn3w" target="_blank" rel="noopener noreferrer">tn3w</a>
        </div>
        <script>

                    setState('ok', 'Success');

        </script>
    </body>
</html>
